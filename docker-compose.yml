services:
  mysql-primary:
    image: mysql:8.0
    container_name: seckill_mysql_primary
    command:
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
    environment:
      MYSQL_ROOT_PASSWORD: 418124
      MYSQL_DATABASE: seckill_db
    volumes:
      - ./infra/mysql/primary/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p418124"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql-replica:
    image: mysql:8.0
    container_name: seckill_mysql_replica
    command:
      - --server-id=2
      - --relay-log=relay-bin
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --read-only=ON
      - --super-read-only=ON
    environment:
      MYSQL_ROOT_PASSWORD: 418124
      MYSQL_DATABASE: seckill_db
    ports:
      - "3308:3306"
    depends_on:
      mysql-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p418124"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql-replica-init:
    image: mysql:8.0
    container_name: seckill_mysql_replica_init
    depends_on:
      mysql-primary:
        condition: service_healthy
      mysql-replica:
        condition: service_healthy
    environment:
      MYSQL_ROOT_PASSWORD: 418124
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: replicator123
    volumes:
      - ./infra/mysql/scripts/setup-replica.sh:/setup-replica.sh:ro
    entrypoint: ["/bin/sh", "/setup-replica.sh"]

  redis:
    image: redis:alpine
    container_name: seckill_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: seckill_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 127.0.0.1 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: seckill_kafka
    ports:
      - "9092:9092"
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server 127.0.0.1:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10

  shardingsphere-proxy:
    build: ./infra/shardingsphere
    container_name: seckill_shardingsphere_proxy
    ports:
      - "3309:3307"
    depends_on:
      mysql-primary:
        condition: service_healthy

  user_service:
    build: ./user_service
    container_name: seckill_user
    environment:
      DATABASE_URL: mysql+pymysql://root:418124@mysql-primary:3306/seckill_db
    depends_on:
      mysql-primary:
        condition: service_healthy

  product_service_1:
    build: ./product_service
    container_name: seckill_product_1
    environment:
      DATABASE_URL: mysql+pymysql://root:418124@mysql-primary:3306/seckill_db
      READ_DATABASE_URL: mysql+pymysql://root:418124@mysql-replica:3306/seckill_db
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy
      mysql-primary:
        condition: service_healthy
      mysql-replica-init:
        condition: service_completed_successfully

  product_service_2:
    build: ./product_service
    container_name: seckill_product_2
    environment:
      DATABASE_URL: mysql+pymysql://root:418124@mysql-primary:3306/seckill_db
      READ_DATABASE_URL: mysql+pymysql://root:418124@mysql-replica:3306/seckill_db
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy
      mysql-primary:
        condition: service_healthy
      mysql-replica-init:
        condition: service_completed_successfully

  order_service:
    build: ./order_service
    container_name: seckill_order_service
    environment:
      ORDER_DATABASE_URL: mysql+pymysql://root:root@shardingsphere-proxy:3307/order_db?charset=utf8mb4
      PRODUCT_DATABASE_URL: mysql+pymysql://root:418124@mysql-primary:3306/seckill_db?charset=utf8mb4
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET_KEY: fallback_secret_key_for_dev
    depends_on:
      redis:
        condition: service_healthy
      mysql-primary:
        condition: service_healthy
      shardingsphere-proxy:
        condition: service_started
      kafka:
        condition: service_healthy

  order_worker:
    build: ./order_service
    container_name: seckill_order_worker
    command: ["python", "-m", "app.worker"]
    environment:
      ORDER_DATABASE_URL: mysql+pymysql://root:root@shardingsphere-proxy:3307/order_db?charset=utf8mb4
      PRODUCT_DATABASE_URL: mysql+pymysql://root:418124@mysql-primary:3306/seckill_db?charset=utf8mb4
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET_KEY: fallback_secret_key_for_dev
    depends_on:
      redis:
        condition: service_healthy
      mysql-primary:
        condition: service_healthy
      shardingsphere-proxy:
        condition: service_started
      kafka:
        condition: service_healthy

  frontend_nginx:
    build: ./frontend
    container_name: seckill_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user_service
      - product_service_1
      - product_service_2
      - order_service
