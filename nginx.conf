worker_processes auto;

events {
    # 把每个工人的最大连接数从 1024 提升到 4096 甚至更高
    worker_connections 4096;
    # 允许一个工人一次性接受多个排队的新连接，极大提升瞬间洪峰的吞吐量
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ================= 作业核心：负载均衡 =================
    # 定义商品服务的服务器集群 (高并发读核心)
    upstream product_backend {
        # 默认使用轮询 (Round Robin) 算法。
        # 如果你想向老师展示更高级的算法，可以去掉下面一行的注释：
        # least_conn;  # 把请求发给当前排队人数最少的实例

        server seckill_product_1:8000;
        server seckill_product_2:8000;
    }

    # 定义用户服务的服务器 (低并发，单实例即可)
    upstream user_backend {
        server seckill_user:8000;
    }
    # ====================================================

    server {
        listen 80;
        server_name localhost;

        # 1. 动静分离：前端静态资源
        # 匹配根路径，直接从 Nginx 内部的硬盘读取文件，速度极快，完全不打扰 Python
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            # 解决 React Router 单页应用刷新报 404 的问题
            try_files $uri $uri/ /index.html;
        }

        # 2. 动静分离：用户服务接口转发
        location /api/users/ {
            proxy_pass http://user_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 3. 动静分离：商品服务接口转发 (带有负载均衡)
        location /api/products/ {
            proxy_pass http://product_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}